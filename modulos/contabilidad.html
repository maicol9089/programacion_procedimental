<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Contabilidad</title>

    <link rel="stylesheet" href="/css/contabilidad.css">
</head>

<body>

<div class="form-container">

    <h2>Registro Contable</h2>

    <form id="registroForm" action="#" method="POST">

        <div class="form-group">
            <label for="tipo">Tipo de movimiento:</label>
            <select id="tipo" name="tipo" required>
                <option value="" disabled selected>Selecciona una opción</option>
                <option value="Ingreso">Ingreso</option>
                <option value="Egreso">Egreso</option>
            </select>
        </div>

        <div class="form-group">
            <label for="concepto">Concepto:</label>
            <input type="text" id="concepto" name="concepto" required placeholder="Ej: Pago de servicios">
        </div>

        <div class="form-group">
            <label for="valor">Valor:</label>
            <input type="number" id="valor" name="valor" required placeholder="Ej: 50000">
        </div>

        <div class="form-group">
            <label for="fecha">Fecha:</label>
            <input type="date" id="fecha" name="fecha" required>
        </div>

        <div class="form-buttons">

            <button type="submit" class="btn-submit">
                Guardar Registro
            </button>

            <button type="reset" class="btn-reset">
                Limpiar Formulario
            </button>

            <button type="button" class="btn-back" onclick="window.location.href='/index/index.html'">
                Volver al Inicio
            </button>

        </div>

    </form>

</div>

<script src="js/contabilidad.js"></script>

</body>
</html>
