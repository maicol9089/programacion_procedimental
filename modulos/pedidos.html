<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Pedido</title>

    <style>

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #8f0047;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .form-container {
            background: #3ef9ff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            text-align: center;
            color: white;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: white;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #acd4ff;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #0056b3;
        }

    </style>

</head>
<body>

    <div class="form-container">

        <h2>Registro de Pedido</h2>

        <form action="#" method="POST">

            <div class="form-group">
                <label for="usuario">Nombre del usuario:</label>

                <input 
                    type="text"
                    id="usuario"
                    name="usuario"
                    required
                    placeholder="Ingresa tu nombre"
                >
            </div>

            <div class="form-group">
                <label for="producto">Producto:</label>

                <input 
                    type="text"
                    id="producto"
                    name="producto"
                    required
                    placeholder="Ej: Audífonos"
                >
            </div>

            <div class="form-group">
                <label for="cantidad">Cantidad:</label>

                <input 
                    type="number"
                    id="cantidad"
                    name="cantidad"
                    required
                    placeholder="Ej: 2"
                >
            </div>

            <!-- NUEVO CAMPO DE VALOR -->
            <div class="form-group">
                <label for="valor">Valor del pedido:</label>

                <input 
                    type="number"
                    id="valor"
                    name="valor"
                    required
                    placeholder="Ej: 150000"
                >
            </div>

            <div class="form-group">
                <label for="direccion">Dirección:</label>

                <input 
                    type="text"
                    id="direccion"
                    name="direccion"
                    required
                    placeholder="Ingresa tu dirección"
                >
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono:</label>

                <input 
                    type="tel"
                    id="telefono"
                    name="telefono"
                    required
                    placeholder="Ej: 3001234567"
                >
            </div>

            <div class="form-group">
                <label for="pago">Método de pago:</label>

                <select id="pago" name="pago" required>
                    <option value="" disabled selected>
                        Selecciona un método
                    </option>

                    <option value="Efectivo">
                        Efectivo
                    </option>

                    <option value="Tarjeta">
                        Tarjeta
                    </option>

                    <option value="Transferencia">
                        Transferencia
                    </option>

                    <option value="Nequi">
                        Nequi
                    </option>
                </select>
            </div>

            <!-- NUEVO CAMPO DE ESTADO DE PAGO -->
            <div class="form-group">
                <label for="estadoPago">Estado del pago:</label>

                <select id="estadoPago" name="estadoPago" required>
                    <option value="" disabled selected>
                        Selecciona el estado
                    </option>

                    <option value="Pagado">
                        Pagado
                    </option>

                    <option value="Pendiente">
                        Pendiente
                    </option>

                    <option value="Abono">
                        Abono
                    </option>
                </select>
            </div>

            <button type="submit" class="btn-submit">
                Guardar Pedido
            </button>

        </form>

    </div>

</body>
</html>
