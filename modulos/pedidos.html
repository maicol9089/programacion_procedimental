<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Pedido</title>

    <link rel="stylesheet" href="/css/pedidos.css">
</head>

<body>

<div class="form-container">

    <h2>Registro de Pedido</h2>

    <form id="pedidoForm" action="#" method="POST">

        <div class="form-group">
            <label for="usuario">Nombre del usuario:</label>
            <input type="text" id="usuario" name="usuario" required placeholder="Ingresa tu nombre">
        </div>

        <div class="form-group">
            <label for="producto">Producto:</label>
            <input type="text" id="producto" name="producto" required placeholder="Ej: Audífonos">
        </div>

        <div class="form-group">
            <label for="cantidad">Cantidad:</label>
            <input type="number" id="cantidad" name="cantidad" required placeholder="Ej: 2">
        </div>

        <div class="form-group">
            <label for="valor">Valor del pedido:</label>
            <input type="number" id="valor" name="valor" required placeholder="Ej: 150000">
        </div>

        <div class="form-group">
            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" name="direccion" required placeholder="Ingresa tu dirección">
        </div>

        <div class="form-group">
            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" required placeholder="Ej: 3001234567">
        </div>

        <div class="form-group">
            <label for="pago">Método de pago:</label>
            <select id="pago" name="pago" required>
                <option value="" disabled selected>Selecciona un método</option>
                <option value="Efectivo">Efectivo</option>
                <option value="Tarjeta">Tarjeta</option>
                <option value="Transferencia">Transferencia</option>
                <option value="Nequi">Nequi</option>
            </select>
        </div>

        <div class="form-group">
            <label for="estadoPago">Estado del pago:</label>
            <select id="estadoPago" name="estadoPago" required>
                <option value="" disabled selected>Selecciona el estado</option>
                <option value="Pagado">Pagado</option>
                <option value="Pendiente">Pendiente</option>
                <option value="Abono">Abono</option>
            </select>
        </div>

        <!-- BOTONES NUEVOS -->
        <div class="form-buttons">

            <button type="submit" class="btn-submit">
                Guardar Pedido
            </button>

            <button type="reset" class="btn-reset">
                Limpiar Formulario
            </button>

            <button type="button" class="btn-back" onclick="window.location.href='/index/index.html'">
                Volver al Inicio
            </button>

        </div>

    </form>

</div>

<script src="js/pedidos.js"></script>

</body>
</html>
