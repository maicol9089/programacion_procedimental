<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Inventario</title>

    <link rel="stylesheet" href="/css/inventario.css">
</head>

<body>

<div class="form-container">

    <h2>Registro de Inventario</h2>

    <form id="inventarioForm" action="#" method="POST">

        <div class="form-group">
            <label for="codigo">Código del Producto:</label>
            <input type="text" id="codigo" name="codigo" required placeholder="Ej: PROD-001">
        </div>

        <div class="form-group">
            <label for="nombre">Nombre del Producto:</label>
            <input type="text" id="nombre" name="nombre" required placeholder="Ej: Arroz">
        </div>

        <div class="form-group">
            <label for="cantidad">Cantidad:</label>
            <input type="number" id="cantidad" name="cantidad" required placeholder="Ej: 50">
        </div>

        <div class="form-group">
            <label for="descripcion">Descripción:</label>
            <input type="text" id="descripcion" name="descripcion" required placeholder="Descripción del producto">
        </div>

        <div class="form-group">
            <label for="marca">Marca:</label>
            <input type="text" id="marca" name="marca" required placeholder="Ej: Alpina">
        </div>

        <div class="form-group">
            <label for="valor_unitario">Valor Unitario:</label>
            <input type="number" id="valor_unitario" name="valor_unitario" required placeholder="Ej: 5000">
        </div>

        <div class="form-group">
            <label for="categoria">Categoría:</label>
            <select id="categoria" name="categoria" required>
                <option value="" disabled selected>Selecciona una categoría</option>
                <option value="Alimentos">Alimentos</option>
                <option value="Bebidas">Bebidas</option>
                <option value="Limpieza">Limpieza</option>
                <option value="Insumos de cocina">Insumos de cocina</option>
                <option value="Otros">Otros</option>
            </select>
        </div>

        <div class="form-group">
            <label for="ubicacion">Ubicación en el restaurante:</label>
            <input type="text" id="ubicacion" name="ubicacion" required placeholder="Ej: Bodega 1 / Cocina / Almacén">
        </div>

        <!-- BOTONES -->
        <div class="form-buttons">

            <button type="submit" class="btn-submit">
                Guardar Producto
            </button>

            <button type="reset" class="btn-reset">
                Limpiar Formulario
            </button>

            <button type="button" class="btn-back" onclick="window.location.href='/index/index.html'">
                Volver al Inicio
            </button>

        </div>

    </form>

</div>

<script src="js/inventario.js"></script>

</body>
</html>
