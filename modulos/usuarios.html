<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuarios</title>

    <link rel="stylesheet" href="/css/usuarios.css">
</head>

<body>

<div class="form-container">

    <h2>Registro de Usuario</h2>

    <form id="usuarioForm" action="#" method="POST">

        <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ingresa el nombre" required>
        </div>

        <div class="form-group">
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" name="apellido" placeholder="Ingresa el apellido" required>
        </div>

        <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" name="telefono" placeholder="3001234567" required>
        </div>

        <div class="form-group">
            <label for="tipo_documento">Tipo de Documento</label>
            <select id="tipo_documento" name="tipo_documento" required>
                <option value="" disabled selected>Selecciona una opción</option>
                <option value="CC">Cédula de Ciudadanía</option>
                <option value="TI">Tarjeta de Identidad</option>
                <option value="CE">Cédula de Extranjería</option>
                <option value="Pasaporte">Pasaporte</option>
            </select>
        </div>

        <div class="form-group">
            <label for="documento">Número de Documento</label>
            <input type="text" id="documento" name="documento" placeholder="Número de identificación" required>
        </div>

        <div class="form-group">
            <label for="correo">Correo Electrónico</label>
            <input type="email" id="correo" name="correo" placeholder="correo@gmail.com" required>
        </div>

        <div class="form-group">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" name="usuario" placeholder="Nombre de usuario" required>
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="Crea una contraseña" required>
        </div>

        <div class="form-group">
            <label for="fecha">Fecha de Nacimiento</label>
            <input type="date" id="fecha" name="fecha" required>
        </div>

        <div class="form-group">
            <label for="rol">Rol del Usuario</label>
            <select id="rol" name="rol" required>
                <option value="" disabled selected>Selecciona un rol</option>
                <option value="Administrador">Administrador</option>
                <option value="Empleado">Empleado</option>
                <option value="Cliente">Cliente</option>
            </select>
        </div>

        <!-- BOTONES NUEVOS -->
        <div class="form-buttons">

            <button type="submit" class="btn-submit">
                Registrar Usuario
            </button>

            <button type="reset" class="btn-reset">
                Limpiar Formulario
            </button>

            <button type="button" class="btn-back" onclick="window.location.href='/index/index.html'">
                Volver al Inicio
            </button>

        </div>

    </form>

</div>

<script src="js/usuarios.js"></script>

</body>
</html>
