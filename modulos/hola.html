<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

  <title>Redes Sociales</title>

  <style>
    body{
      background:#8f0047;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box-social{
      background:white;
      padding:30px;
      border-radius:20px;
      width:90%;
      max-width:700px;
    }

    .card{
      border-radius:15px;
    }

    img{
      width:70px;
      display:block;
      margin:auto;
    }
  </style>
</head>

<body>

<div class="box-social">

  <h1 class="title has-text-centered has-text-danger">
    Redes Sociales
  </h1>

  <div class="columns">

    <div class="column">
      <div class="card p-4">

        <img src="https://cdn-icons-png.flaticon.com/128/2111/2111463.png">

        <h2 class="title is-5 has-text-centered">
          Instagram
        </h2>

        <p class="has-text-centered">
          @venecia.rest
        </p>

        <a href="https://instagram.com"
        class="button is-danger is-fullwidth">
          Entrar
        </a>

      </div>
    </div>

    <div class="column">
      <div class="card p-4">

        <img src="https://cdn-icons-png.flaticon.com/128/733/733585.png">

        <h2 class="title is-5 has-text-centered">
          WhatsApp
        </h2>

        <p class="has-text-centered">
          +57 300 123 4567
        </p>

        <a href="https://wa.me/573001234567"
        class="button is-success is-fullwidth">
          Mensaje
        </a>

      </div>
    </div>

  </div>

</div>


</body>
</html>
